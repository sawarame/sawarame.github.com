name: Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  inline-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install Antigravity CLI
        run: |
          # Goを使って公式リポジトリからCLIをインストール
          go install github.com/google/antigravity/cmd/agy@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # reviewdog をセットアップ
      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run Review and Post Inline Comments
        env:
          AGY_API_KEY: ${{ secrets.AGY_API_KEY }}
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Antigravity を「rdjson（Reviewdog形式）」または「checkstyle形式」で出力させる
          # ※ agy の出力フォーマットに --format=rdjson や --format=checkstyle が用意されています
          agy run --review --target=./src --target=./blog --target=./docs --target=./i18n --target=./static --format=rdjson > agy_result.json
          
          # 2. 結果を reviewdog に流し込んで、GitHub の該当行にコメントとして投稿する
          # -reporter=github-pr-review を指定することでインラインコメントになります
          cat agy_result.json | reviewdog -f=rdjson -reporter=github-pr-review -level=warning