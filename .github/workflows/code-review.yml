name: Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  inline-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Antigravity CLI
        run: |
          # 公式の高速インストールスクリプトを実行（Linux環境用）
          curl -fsSL https://antigravity.google/cli/install.sh | bash
          
          # インストールされたバイナリのパスを GitHub Actions の環境に通す
          # ※通常 /usr/local/bin や $HOME/.local/bin 等に展開されますが、確実にするため以下を指定
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH

      # reviewdog をセットアップ
      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run Review and Post Inline Comments
        env:
          AGY_API_KEY: ${{ secrets.AGY_API_KEY }}
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 一度すべての出力をファイルに保存
          agy run --review --target=./src --target=./blog --target=./docs --target=./i18n --target=./static --format=rdjson > agy_raw_result.json

          # 出力1
          cat agy_raw_result.json
          
          # 2. 最初に出現する「{」からファイルの末尾までを抽出し、綺麗な JSON ファイルを作る
          # (これにより先頭に混ざる 'CLI setup...' などの不要なログを完全に消し去ります)
          sed -n '/{/,$p' agy_raw_result.json > agy_clean_result.json

          # 出力2
          cat agy_clean_result.json
          
          # 3. 中身がある場合のみ reviewdog に流し込む
          if [ -s agy_clean_result.json ]; then
            cat agy_clean_result.json | reviewdog -f=rdjson -reporter=github-pr-review -level=warning
          fi
