<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="100%" height="100%" fill="none">
  <defs>
    <linearGradient id="gauge-grad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>
    <filter id="shadow" filterUnits="userSpaceOnUse" x="-50" y="-50" width="200" height="200">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Track -->
  <path d="M 19.69 67.5 A 35 35 0 1 1 80.31 67.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Fill (approx 80%) -->
  <path d="M 19.69 67.5 A 35 35 0 1 1 80.31 67.5" fill="none" stroke="url(#gauge-grad)" stroke-width="12" stroke-linecap="round" stroke-dasharray="146.6" stroke-dashoffset="29.3"/>
  
  <!-- Ticks -->
  <line x1="19.69" y1="67.5" x2="23.16" y2="65.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="19.69" y1="32.5" x2="23.16" y2="34.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="15" x2="50" y2="19" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="80.31" y1="32.5" x2="76.84" y2="34.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="80.31" y1="67.5" x2="76.84" y2="65.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>

  <!-- Needle Base Outer -->
  <circle cx="50" cy="50" r="8" fill="#FFFFFF" filter="url(#shadow)"/>
  
  <!-- Needle Line -->
  <!-- Needle pointing to 80% -->
  <line x1="50" y1="50" x2="74.7" y2="41.9" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Needle Base Inner -->
  <circle cx="50" cy="50" r="3" fill="#1E3C72"/>
</svg>
